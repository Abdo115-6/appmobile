name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Flutter build iOS
        id: build
        continue-on-error: true
        run: flutter build ios --no-codesign 2>&1 | tee /tmp/ios-build.log

      - name: Show error log
        if: steps.build.outcome != 'success'
        run: tail -100 /tmp/ios-build.log

      - name: Fail if build failed
        if: steps.build.outcome != 'success'
        run: exit 1
